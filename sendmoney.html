<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero - Billetera Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .send-container {
            background-color: #1e293b;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            border: 1px solid #334155;
        }
        h2, h4 { color: #f8fafc; font-weight: 600; }
        .form-label { color: #cbd5e1; font-weight: 500; }
        .form-control, .form-select {
            background-color: #334155;
            border: 1px solid #475569;
            color: #ffffff;
        }
        .form-control:focus, .form-select:focus {
            background-color: #334155;
            border-color: #3b82f6;
            color: #ffffff;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
        .btn-success-custom {
            background-color: #10b981;
            color: white;
            border: none;
            transition: all 0.2s ease;
        }
        /* Mantiene el texto legible al pasar el cursor o al presionar TAB */
        .btn-success-custom:hover,
        .btn-success-custom:focus,
        .btn-success-custom:focus-visible {
            background-color: #059669;
            color: white !important; /* Evita que el texto se vuelva oscuro al enfocarse */
            outline: none;
            box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.3); /* Anillo de enfoque verde a juego */
        }

        #btnEnviarDinero { display: none; } /* Oculto por defecto hasta elegir contacto */
        #nuevoContactoForm { display: none; } /* Oculto por defecto hasta pulsar + */
    </style>
</head>
<body>

<div class="send-container">
    <h2 class="text-center mb-4">Enviar Dinero</h2>
    
    <div id="alertContainerGlobal"></div>

    <div class="mb-3">
        <label for="searchContact" class="form-label">Buscar Contacto (Nombre o Alias)</label>
        <input type="text" class="form-control" id="searchContact" placeholder="Escribe para buscar...">
    </div>

    <form id="mainSendForm">
        <div class="mb-3">
            <label for="contactSelect" class="form-label">Seleccionar Contacto</label>
            <select class="form-select" id="contactSelect" required>
                <option value="" selected disabled>-- Elige un contacto de tu agenda --</option>
                <option value="1" data-search="juan perez jperez">Juan Pérez (Alias: jperez)</option>
                <option value="2" data-search="maria gomez mariago">María Gómez (Alias: mariago)</option>
                <option value="3" data-search="lucas diaz lucas.d">Lucas Díaz (Alias: lucas.d)</option>
            </select>
        </div>

        <div class="mb-4">
            <label for="amountInput" class="form-label">Monto a Enviar</label>
            <div class="input-group">
                <span class="input-group-text bg-secondary border-0 text-white">$</span>
                <input type="number" class="form-control" id="amountInput" placeholder="0.00" min="1" required>
            </div>
        </div>

        <button type="submit" class="btn btn-success-custom w-100 py-2 rounded-3 mb-3" id="btnEnviarDinero">
            Confirmar Envío de Dinero
        </button>
    </form>

    <button type="button" class="btn btn-outline-info w-100 py-2 rounded-3 mb-3" id="btnMostrarAgregar">
        + Agregar nuevo contacto
    </button>

    <div id="nuevoContactoForm" class="p-3 mb-3 rounded" style="background-color: #1e293b; border: 1px dashed #475569;">
        <h4>Nuevo Contacto</h4>
        <div id="alertContacto"></div>
        <div class="mb-2">
            <label class="form-label">Nombre Completo</label>
            <input type="text" class="form-control form-control-sm" id="newName" placeholder="Ej: Carlos Sosa">
        </div>
        <div class="mb-2">
            <label class="form-label">Alias</label>
            <input type="text" class="form-control form-control-sm" id="newAlias" placeholder="Ej: carlos.sosa">
        </div>
        <div class="mb-3">
            <label class="form-label">Número de cuenta</label>
            <input type="text" class="form-control form-control-sm" id="newCbu" placeholder="Ej: 123456789">
        </div>

        <div class="d-flex gap-2">
            <button type="button" class="btn btn-success-custom btn-sm w-50" id="btnGuardarContacto">Guardar</button>
            <button type="button" class="btn btn-secondary btn-sm w-50" id="btnCancelarContacto">Cancelar</button>
        </div>
    </div>

    <a href="menu.html" class="btn btn-outline-secondary w-100 py-2 rounded-3 text-decoration-none text-center d-block">
        Volver al Menú
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="historial.js"></script>
<script src="procesar_envio.js"></script>
</body>
</html>
