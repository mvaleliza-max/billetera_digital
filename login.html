<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Billetera Digital</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="misestilos.css">
</head>
<body>

<div class="login-container">

    <div class="login-container">
        <h2 class="text-center mb-4">Inicio de sesión</h2>

        <div id="alertContainer"></div>
    <form action="menu.html" method="GET" id="loginForm">
        <div class="mb-4">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
        </div>

        <button type="submit" class="btn btn-custom w-100 py-2 mt-2">Iniciar sesión</button>
    </form>
</div>

<!-- Scripts de Bootstrap y jQuery -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="validar_inicio.js"></script>

</body>
</html>
